name: Build

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Backend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: allgrow-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: allgrow-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Syntax check all source files
        run: find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/prisma/*" | xargs node --check

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vinticode-frontend
    env:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vinticode-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
