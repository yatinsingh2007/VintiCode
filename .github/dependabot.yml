version: 2

updates:
  # 🔵 Backend (Allgrow)
  - package-ecosystem: "npm"
    directory: "/allgrow-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(back)"
    groups:
      backend-deps:
        patterns:
          - "*"

  # 🟢 Frontend (Vinticode)
  - package-ecosystem: "npm"
    directory: "/vinticode-frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    groups:
      frontend-deps:
        patterns:
          - "*"

  # ⚙️ GitHub Actions (CI/CD)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
